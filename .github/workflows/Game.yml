on: push
jobs:
  Info:
    runs-on: ubuntu-latest
    name: 输出信息
    steps:
    - name: 输出绝对路径
      run: pwd

    - name: 引入检出
      uses: actions/checkout@v6

  Compile:
    runs-on: ubuntu-latest
    name: 编译代码
    steps:
    - name: 引入检出
      uses: actions/checkout@v6

    - name: 配置 CMake 并编译项目
      run: |
        mkdir -p build  # 添加 -p 参数防止报错
        cd build
        cmake -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ..
        make -j$(nproc)